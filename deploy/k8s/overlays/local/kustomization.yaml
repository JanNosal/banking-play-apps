apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Local cluster (kind / minikube / Docker Desktop Kubernetes). This is the overlay you apply:
#   kubectl apply -k deploy/k8s/overlays/local
resources:
  - ../../base

# Smaller seed so the first run is fast; everything else inherits from base.
patches:
  - path: patch-seed.yaml
